name: 🔍Debug_glib2

on:
  workflow_dispatch:
    inputs:
      upstream:
        description: '选择上游源码仓库'
        type: choice
        options:
          - lkiuyu/immortalwrt
          - xuxin1955/immortalwrt
        default: lkiuyu/immortalwrt
        required: true

env:
  REPO_URL: https://github.com/${{ github.event.inputs.upstream }}
  REPO_BRANCH: master
  TZ: Asia/Shanghai

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -y update
        sudo -E apt-get -y install $(curl -fsSL https://raw.githubusercontent.com/xuxin1955/depend_ubuntu2204_openwrt/refs/heads/main/depend_ubuntu2204_openwrt)
        sudo timedatectl set-timezone "$TZ"

    - name: Clone source code
      run: |
        sudo chmod 777 /mnt
        git clone $REPO_URL -b $REPO_BRANCH /mnt/openwrt
        ln -sf /mnt/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Update & Install feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a -f

    - name: Apply minimal config
      run: |
        cd openwrt
        printf '%s\n' \
          'CONFIG_TARGET_msm89xx=y' \
          'CONFIG_TARGET_msm89xx_msm8916=y' \
          'CONFIG_TARGET_msm89xx_msm8916_DEVICE_openstick-ufi103s=y' \
          'CONFIG_PACKAGE_glib2=y' \
          'CONFIG_PACKAGE_libmbim=y' \
          > .config
        make defconfig

    - name: Build host tools & toolchain
      run: |
        cd openwrt
        echo "===== 编译 host tools ====="
        make tools/install -j$(nproc) V=s
        echo "===== 编译 toolchain ====="
        make toolchain/install -j$(nproc) V=s

    - name: Compile glib2
      run: |
        cd openwrt
        echo "===== 开始编译 glib2 ====="
        make package/feeds/packages/glib2/compile V=s -j$(nproc) 2>&1 | tee /tmp/glib2_build.log
        echo "===== glib2 编译结束 ====="

    - name: Compile libmbim
      run: |
        cd openwrt
        echo "===== 开始编译 libmbim ====="
        make package/feeds/packages/libmbim/compile V=s -j$(nproc) 2>&1 | tee /tmp/libmbim_build.log
        echo "===== libmbim 编译结束 ====="

    - name: Upload build logs
      if: always()
      uses: actions/upload-artifact@main
      with:
        name: debug-logs
        path: |
          /tmp/glib2_build.log
          /tmp/libmbim_build.log
